# Dev Environment Variables
# Variables are scoped to the dev target

targets:
  dev:
    variables:
      # Application Configuration
      app_name: "dqx-rule-generator-dev"
      app_description: "DQX Data Quality Manager - Dev Environment"

      # Generation Job Configuration
      job_name: "DQ Rule Generation - Dev"
      # Use bundle's deployed path - notebooks are synced to workspace.root_path
      notebook_path: "${workspace.root_path}/files/notebooks/generate_dq_rules_fast"

      # Validation Job Configuration
      validation_job_name: "DQ Rule Validation - Dev"
      # Use bundle's deployed path - notebooks are synced to workspace.root_path
      validation_notebook_path: "${workspace.root_path}/files/notebooks/validate_dq_rules"

      # Sensitive / env-specific: set via .env (local) or CI secrets (--var). Never commit real values here.
      # Local: copy .env.example to .env, set SQL_WAREHOUSE_ID, SERVICE_PRINCIPAL_NAME, and optionally
      # LAKEBASE_INSTANCE_NAME / LAKEBASE_DATABASE, then run ./scripts/deploy-dev.sh
      sql_warehouse_id: ""           # from .env SQL_WAREHOUSE_ID or --var
      service_principal_name: ""     # from .env SERVICE_PRINCIPAL_NAME or --var
      lakebase_instance_name: ""     # from .env LAKEBASE_INSTANCE_NAME or --var (optional)
      lakebase_database: ""          # from .env LAKEBASE_DATABASE or --var (optional)
